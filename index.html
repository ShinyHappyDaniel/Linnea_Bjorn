<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Längtan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      background: #08080f;
      color: #e4ddd4;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(60, 40, 100, 0.35) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2.5rem;
      max-width: 560px;
      width: 100%;
    }

    .title {
      font-size: clamp(4.5rem, 14vw, 9rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: rise 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
    }

    .description {
      font-size: clamp(1.05rem, 2.5vw, 1.2rem);
      font-weight: 300;
      line-height: 1.9;
      margin-bottom: 2.8rem;
      color: rgba(228, 221, 212, 0.72);
      opacity: 0;
      animation: rise 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.9s;
    }

    .divider {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(228, 221, 212, 0.3), transparent);
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: rise 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.2s;
    }

    .composer {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 300;
      font-style: normal;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: rgba(228, 221, 212, 0.45);
      line-height: 2;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: rise 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.4s;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      opacity: 0;
      animation: rise 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.8s;
    }

    .play-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 1px solid rgba(228, 221, 212, 0.3);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.4s ease, transform 0.3s ease;
    }

    .play-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(228, 221, 212, 0.08);
      transition: opacity 0.4s;
    }

    .play-btn:hover {
      border-color: rgba(228, 221, 212, 0.65);
      transform: scale(1.04);
    }

    .play-btn.playing {
      border-color: rgba(228, 221, 212, 0.5);
    }

    .play-btn.playing::before {
      animation: ring 3s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0; }
    }

    .icon-play {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 9px 0 9px 16px;
      border-color: transparent transparent transparent rgba(228, 221, 212, 0.85);
      margin-left: 4px;
    }

    .icon-pause {
      display: none;
      align-items: center;
      gap: 5px;
    }

    .icon-pause span {
      display: block;
      width: 3px;
      height: 18px;
      background: rgba(228, 221, 212, 0.85);
      border-radius: 2px;
    }

    .playing .icon-play { display: none; }
    .playing .icon-pause { display: flex; }

    /* progress bar */
    .progress-track {
      width: 180px;
      height: 1px;
      background: rgba(228, 221, 212, 0.15);
      border-radius: 1px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(228, 221, 212, 0.5);
      border-radius: 1px;
      transition: width 0.25s linear;
      pointer-events: none;
    }

    .time {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: rgba(228, 221, 212, 0.3);
      font-family: 'Cormorant Garamond', monospace;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <h1 class="title">Längtan</h1>

    <p class="description">
      Förstärk din upplevelse av utställningen med klanger<br>
      som minner om våra drömmar, önskningar och vår längtan.
    </p>

    <div class="divider"></div>

    <p class="composer">Musik av<br>Björn och Linnéa Dixgård</p>

    <div class="player">
      <button class="play-btn" id="playBtn" onclick="togglePlay()" aria-label="Spela">
        <span class="icon-play"></span>
        <div class="icon-pause"><span></span><span></span></div>
      </button>

      <div class="progress-track" id="track" onclick="seek(event)">
        <div class="progress-fill" id="fill"></div>
      </div>

      <span class="time" id="time">0:00</span>
    </div>
  </div>

  <audio id="audio" src="https://github.com/ShinyHappyDaniel/Linnea_Bjorn/releases/download/v1.0/langtan.m4a" preload="metadata"></audio>

  <script>
    const audio = document.getElementById('audio');
    const btn   = document.getElementById('playBtn');
    const fill  = document.getElementById('fill');
    const time  = document.getElementById('time');
    const track = document.getElementById('track');

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
      } else {
        audio.pause();
        btn.classList.remove('playing');
      }
    }

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return m + ':' + sec;
    }

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      time.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => btn.classList.remove('playing'));

    function seek(e) {
      if (!audio.duration) return;
      const rect = track.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }
  </script>
</body>
</html>
